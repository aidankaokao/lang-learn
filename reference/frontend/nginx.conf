# 前端容器 nginx 設定【根路徑版・無 route】（起手檔）
# 用途：nginx 伺服 Vite build 出的靜態檔 + 把 /api 反代到後端容器，前端掛在網域根 /。
#
# ⚠️ 若要用「內外網共用 route」的部署（http://ip:port/<route>/ 與 https://<DNS>/<route>/），
#    請改用同資料夾的 nginx.conf.template（路由版・推薦）。本檔僅適合純內網、直接 ip:port/ 存取、
#    且未來不綁 DNS route 的情境。
#
# 放到專案的 frontend/nginx.conf。說明見 frontend-backend-integration.md §3。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # 前端 SPA：找不到實體檔就回 index.html（前端路由用，重整不 404）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 反代到後端容器：backend 是 docker-compose 的 service 名稱，內埠 8000
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 串流（LLM 逐字輸出）必要：關 buffering、拉長 timeout
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
